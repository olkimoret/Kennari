<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E2428" />
  <title>Kennari — Workout</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ---- Phase color switching ---- */
    /* Toggle class on #workout-screen to switch warmup ↔ working */

    .workout-screen.phase-warmup .weight-number  { color: var(--accent-warmup); }
    .workout-screen.phase-working .weight-number  { color: var(--accent); }

    .workout-screen.phase-warmup  .btn-complete   { background: var(--accent-warmup); }
    .workout-screen.phase-working .btn-complete   { background: var(--accent); }

    .workout-screen.phase-warmup  .mode-btn.active { color: var(--accent-warmup); }
    .workout-screen.phase-working .mode-btn.active { color: var(--accent); }

    /* ---- Header ---- */
    .workout-header {
      display: flex;
      align-items: center;
      padding: 20px 24px 12px;
      gap: 12px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .skip-link {
      font-size: var(--text-sm);
      color: var(--text-muted);
      transition: color 0.15s ease;
    }

    .skip-link:hover { color: var(--cream); }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }

    .icon-btn:hover { color: var(--cream); }

    /* ---- Main content ---- */
    .workout-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 8px 24px;
      /* padding-bottom = nav (64px) + CTA area (~120px) = ~184px
         this shifts the flex center into the actual visible space */
      padding-bottom: 184px;
    }

    /* ---- Exercise info ---- */
    .exercise-info {
      text-align: center;
      padding-top: 4px;
    }

    .exercise-name {
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-2xl);
      font-weight: 600;
      color: var(--cream);
      line-height: 1.2;
    }

    .session-sub {
      margin-top: 5px;
    }

    /* ---- Weight card ---- */
    .weight-card {
      text-align: center;
      padding: 24px 20px 20px;
    }

    .weight-display {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .weight-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 1;
      transition: color 0.25s ease;
      letter-spacing: 0.02em;
    }

    .weight-unit {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      padding-bottom: 10px; /* aligns baseline with number */
    }

    /* ---- Mode icons ---- */
    .mode-icons {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .mode-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: color 0.15s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      transform: scale(1.12);
    }

    .mode-label {
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* ---- Set tracker ---- */
    .set-tracker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .set-label-text {
      /* inherits .label-caps from class below */
    }

    .reps-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ---- CTA pinned above bottom nav ---- */
    .cta-area {
      position: fixed;
      bottom: 64px; /* height of bottom-nav */
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 16px 24px 10px;
      background: linear-gradient(to top, var(--bg) 65%, transparent);
      z-index: 50;
    }

    .btn-done-early {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 0;
      margin-top: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s ease;
    }

    .btn-done-early:hover { color: var(--cream); }

    .btn-complete {
      width: 100%;
      height: 52px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.25s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-complete:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-complete:disabled {
      cursor: default;
      opacity: 1; /* keep fully visible during rest countdown */
    }

    @keyframes completePulse {
      0%   { transform: scale(1); }
      35%  { transform: scale(0.94); filter: brightness(1.25); }
      70%  { transform: scale(1.03); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    .btn-complete.pulsing {
      animation: completePulse 0.28s ease;
    }

    /* ---- Completion overlay ---- */
    .completion-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      animation: fadeIn 0.4s ease forwards;
    }

    .completion-overlay[hidden] { display: none; }

    .completion-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .completion-icon {
      font-size: 52px;
      line-height: 1;
    }

    .completion-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      color: var(--cream);
      line-height: 1.05;
      letter-spacing: 0.03em;
    }

    .completion-sub {
      font-size: var(--text-sm);
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    /* ---- Exercise Cards (Set Tracker) ---- */
    .exercise-cards {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .ex-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 6px;
      background: var(--surface);
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
    }

    .ex-card-name {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .ex-card--active .ex-card-name {
      color: var(--cream);
    }

    .ex-card-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .ex-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid var(--text-muted);
      background: transparent;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
    }

    /* Active card border — switches with phase */
    .workout-screen.phase-warmup  .ex-card--active { border-color: var(--accent-warmup); }
    .workout-screen.phase-working .ex-card--active { border-color: var(--accent); }

    /* Active exercise dots — empty outline color by phase */
    .workout-screen.phase-warmup  .ex-card--active .ex-dot { border-color: var(--accent-warmup); }
    .workout-screen.phase-working .ex-card--active .ex-dot { border-color: var(--accent); }

    /* Active exercise dots — filled color by phase */
    .workout-screen.phase-warmup  .ex-card--active .ex-dot.filled {
      background: var(--accent-warmup);
      border-color: var(--accent-warmup);
      transform: scale(1.1);
    }
    .workout-screen.phase-working .ex-card--active .ex-dot.filled {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.1);
    }

    /* Completed exercise — all 3 salmon dots filled */
    .ex-card--completed .ex-dot {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* ---- Confirm stop card ---- */
    .confirm-card {
      height: auto;
      padding: 32px 28px 40px;
      gap: 0;
    }

    .confirm-heading {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--cream);
      text-align: center;
      margin-bottom: 8px;
    }

    .confirm-sub {
      font-size: var(--text-sm);
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .confirm-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .confirm-no-btn {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 0;
      transition: color 0.15s ease;
    }

    .confirm-no-btn:hover { color: var(--cream); }
  </style>
</head>
<body>
  <div id="workout-screen" class="app-container workout-screen phase-warmup">

    <!-- ── Header ───────────────────────────────────────── -->
    <header class="workout-header">
      <span id="phase-pill" class="pill-warmup">WARM UP</span>
      <div class="header-right">
        <button id="btn-skip-warmup" class="btn-ghost skip-link" type="button">
          Skip warm up
        </button>
      </div>
    </header>

    <!-- ── Main content ──────────────────────────────────── -->
    <main class="workout-main">

      <!-- Exercise name -->
      <div class="exercise-info">
        <h2 id="exercise-name" class="exercise-name">—</h2>
        <p id="session-label" class="session-sub label-caps">TRAINING A</p>
      </div>

      <!-- Weight display card -->
      <div class="card weight-card">

        <div class="weight-display">
          <span id="weight-number" class="weight-number">—</span>
          <span id="weight-unit"   class="weight-unit">LBS</span>
        </div>

        <!-- Display mode icons -->
        <div class="mode-icons" role="group" aria-label="Weight display mode">

          <!-- Total -->
          <button class="mode-btn active" data-mode="total" type="button" aria-label="Total weight">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2.2"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
            <span class="mode-label">total</span>
          </button>

          <!-- Per side (barbell) -->
          <button class="mode-btn" data-mode="barbell" type="button" aria-label="Per side">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
              <rect x="8"    y="11"   width="8"   height="2"/>
              <rect x="5"    y="9.5"  width="2.5" height="5" rx="0.6"/>
              <rect x="16.5" y="9.5"  width="2.5" height="5" rx="0.6"/>
              <rect x="1"    y="8"    width="3.5" height="8" rx="1.5"/>
              <rect x="19.5" y="8"    width="3.5" height="8" rx="1.5"/>
            </svg>
            <span class="mode-label">per side</span>
          </button>

          <!-- Per dumbbell -->
          <button class="mode-btn" data-mode="dumbbell" type="button" aria-label="Per dumbbell">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
              <rect x="9"    y="11"  width="6"   height="2"/>
              <rect x="1"    y="8"   width="7.5" height="8" rx="2.5"/>
              <rect x="15.5" y="8"   width="7.5" height="8" rx="2.5"/>
            </svg>
            <span class="mode-label">per dumbbell</span>
          </button>

        </div>
      </div>

      <!-- Set info -->
      <div class="set-tracker">
        <p id="reps-label" class="reps-label">5 REPS</p>
        <p id="set-label" class="label-caps set-label-text">SET 1 / 4 · 40%</p>
      </div>

      <!-- Exercise cards -->
      <div id="exercise-cards" class="exercise-cards">
        <!-- injected by workout.js -->
      </div>

    </main>

    <!-- ── Complete Set CTA ──────────────────────────────── -->
    <div class="cta-area">
      <button id="btn-complete" class="btn-complete" type="button">
        COMPLETE SET
      </button>
    </div>

    <!-- ── Bottom nav ────────────────────────────────────── -->
    <nav class="bottom-nav">

      <button class="nav-tab active" type="button"
              onclick="location.href='workout.html'" aria-label="Workout">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="9"    y="11"  width="6"   height="2"/>
          <rect x="1"    y="8"   width="7.5" height="8" rx="2.5"/>
          <rect x="15.5" y="8"   width="7.5" height="8" rx="2.5"/>
        </svg>
        <span>Workout</span>
      </button>

      <button class="nav-tab" type="button"
              onclick="location.href='tracking.html'" aria-label="Tracking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        <span>Tracking</span>
      </button>

      <button class="nav-tab" type="button"
              onclick="location.href='settings.html'" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83
                   M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        <span>Settings</span>
      </button>

    </nav>

    <!-- ── Workout completion overlay ───────────────────── -->
    <div id="completion-overlay" class="completion-overlay" hidden>
      <div class="completion-card">
        <div class="completion-icon">💪</div>
        <h2 class="completion-heading">Workout<br>Complete</h2>
        <p id="completion-sub" class="completion-sub"></p>
        <button id="btn-done" class="btn-primary" type="button"
                style="margin-top: 8px;">
          Done
        </button>
      </div>
    </div>

    <!-- ── Confirm stop overlay + card ─────────────────── -->
    <div id="confirm-overlay" class="timer-overlay"></div>
    <div id="confirm-card" class="timer-card confirm-card">
      <div class="timer-handle"></div>
      <p class="confirm-heading">Done for today?</p>
      <p class="confirm-sub">Your progress so far will be saved.</p>
      <div class="confirm-actions">
        <button id="btn-confirm-yes" class="btn-primary" type="button">
          Yes, stop workout
        </button>
        <button id="btn-confirm-no" class="btn-ghost confirm-no-btn" type="button">
          No, keep going
        </button>
      </div>
    </div>

    <!-- ── Rest timer overlay + card ───────────────────── -->
    <div id="timer-overlay" class="timer-overlay"></div>
    <div id="timer-card" class="timer-card">
      <div class="timer-handle"></div>
      <p class="timer-label label-caps">Rest</p>
      <div class="timer-ring-wrap">
        <svg class="timer-ring-svg" viewBox="0 0 160 160" aria-hidden="true">
          <circle class="timer-ring-track"    cx="80" cy="80" r="68"/>
          <circle class="timer-ring-progress" cx="80" cy="80" r="68" id="timer-ring"/>
        </svg>
        <span id="timer-number" class="timer-number">0:00</span>
      </div>
      <button id="btn-skip-rest" class="btn-ghost timer-skip-btn" type="button">Skip Rest</button>
    </div>

  </div><!-- #workout-screen -->

  <script type="module" src="workout.js"></script>
</body>
</html>
