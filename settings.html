<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E2428" />
  <title>Kennari — Settings</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ---- Header ---- */
    .settings-header {
      padding: 28px 24px 16px;
    }

    .settings-title {
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--cream);
      line-height: 1.15;
    }

    /* ---- Scrollable main area ---- */
    .settings-main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 24px 96px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ---- Section ---- */
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-label {
      padding: 0 2px;
    }

    /* ---- Card fields ---- */
    .settings-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
    }

    /* ---- Field group ---- */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Input with inline unit badge */
    .input-with-unit {
      position: relative;
    }

    .input-with-unit .input-field {
      padding-right: 52px;
    }

    .input-unit-badge {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ---- Success feedback ---- */
    .save-feedback {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--success);
      text-align: center;
      height: 18px;           /* reserve space so layout doesn't jump */
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .save-feedback.visible {
      opacity: 1;
    }

    /* ---- Units toggle ---- */
    .unit-toggle {
      display: flex;
      background: var(--surface-raised);
      border-radius: var(--radius-pill);
      padding: 4px;
      gap: 4px;
      align-self: flex-start;
    }

    .toggle-opt {
      padding: 8px 24px;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-opt.active {
      background: var(--accent);
      color: var(--cream);
    }

    /* ---- Rest timer row ---- */
    .timer-row {
      display: flex;
      gap: 12px;
    }

    .timer-row .field-group {
      flex: 1;
    }

    .helper-text {
      font-size: var(--text-xs);
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ---- Increment toggle ---- */
    .increment-toggle {
      display: flex;
      background: var(--surface-raised);
      border-radius: var(--radius-pill);
      padding: 4px;
      gap: 4px;
    }

    .increment-toggle .toggle-opt {
      flex: 1;
      text-align: center;
      padding: 8px 0;
    }

    /* ---- Account section ---- */
    .email-display {
      font-size: var(--text-sm);
      color: var(--text-muted);
      padding: 4px 2px;
      line-height: 1.4;
      word-break: break-all;
    }

    .btn-logout {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 52px;
      background: none;
      border: 1px solid rgba(224, 123, 106, 0.35);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-logout:hover {
      background: rgba(224, 123, 106, 0.08);
      border-color: var(--accent);
    }

    /* ---- Save button — 50% wide, right-aligned, starts muted ---- */
    .save-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .save-row .save-feedback {
      flex: 1;
      text-align: left;
      height: auto;
    }

    .btn-save {
      width: 50%;
      height: 48px;
      background: var(--surface-raised);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: background 0.2s ease, color 0.2s ease,
                  border-color 0.2s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* Dirty = changes pending → becomes salmon and tappable */
    .btn-save.dirty {
      background: var(--accent);
      color: var(--cream);
      border-color: var(--accent);
      cursor: pointer;
    }

    .btn-save.dirty:hover  { background: var(--accent-dark); border-color: var(--accent-dark); }
    .btn-save.dirty:active { transform: scale(0.97); }

    /* Spinner inside save button */
    .btn-save .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(242, 232, 217, 0.35);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn-save.loading .btn-label { display: none; }
    .btn-save.loading .spinner   { display: inline-block; }
    .btn-save.loading            { cursor: default; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app-container">

    <!-- ── Header ───────────────────────────────────────── -->
    <header class="settings-header">
      <h1 class="settings-title">Settings</h1>
    </header>

    <!-- ── Main ─────────────────────────────────────────── -->
    <main class="settings-main">

      <!-- ─── PROFILE ─────────────────────────────────── -->
      <div class="settings-section">
        <span class="label-caps section-label">Profile</span>
        <div class="card settings-card">

          <div class="field-group">
            <label class="label-caps" for="input-name">Display Name</label>
            <input id="input-name" type="text" class="input-field"
                   placeholder="Your name" autocomplete="given-name"
                   autocapitalize="words" />
          </div>

          <div class="field-group">
            <label class="label-caps" for="input-age">Age</label>
            <input id="input-age" type="number" class="input-field"
                   placeholder="Your age" min="13" max="120"
                   inputmode="numeric" />
          </div>

          <div class="field-group">
            <label class="label-caps" for="input-bodyweight">Bodyweight</label>
            <div class="input-with-unit">
              <input id="input-bodyweight" type="number" class="input-field"
                     placeholder="e.g. 185" inputmode="decimal" />
              <span class="input-unit-badge unit-label">LBS</span>
            </div>
          </div>

          <div class="save-row">
            <p class="save-feedback" id="feedback-profile">Saved ✓</p>
            <button id="btn-save-profile" class="btn-save" type="button">
              <span class="btn-label">Save</span>
              <span class="spinner" aria-hidden="true"></span>
            </button>
          </div>

        </div>
      </div>

      <!-- ─── EQUIPMENT ───────────────────────────────── -->
      <div class="settings-section">
        <span class="label-caps section-label">Equipment</span>
        <div class="card settings-card">

          <div class="field-group">
            <label class="label-caps" for="input-barbell">Barbell Weight</label>
            <div class="input-with-unit">
              <input id="input-barbell" type="number" class="input-field"
                     placeholder="45" inputmode="decimal" />
              <span class="input-unit-badge unit-label">LBS</span>
            </div>
          </div>

          <div class="save-row">
            <p class="save-feedback" id="feedback-equipment">Saved ✓</p>
            <button id="btn-save-equipment" class="btn-save" type="button">
              <span class="btn-label">Save</span>
              <span class="spinner" aria-hidden="true"></span>
            </button>
          </div>

        </div>
      </div>

      <!-- ─── UNITS ────────────────────────────────────── -->
      <div class="settings-section">
        <span class="label-caps section-label">Units</span>
        <div class="card settings-card">

          <div class="unit-toggle" role="group" aria-label="Weight unit">
            <button class="toggle-opt active" data-unit="lbs" type="button">LBS</button>
            <button class="toggle-opt"        data-unit="kg"  type="button">KG</button>
          </div>

        </div>
      </div>

      <!-- ─── REST TIMERS ──────────────────────────────── -->
      <div class="settings-section">
        <span class="label-caps section-label">Rest Timers</span>
        <div class="card settings-card">

          <div class="timer-row">
            <div class="field-group">
              <label class="label-caps" for="input-rest-warmup">Warm Up</label>
              <input id="input-rest-warmup" type="number" class="input-field"
                     placeholder="90" min="10" max="600" inputmode="numeric" />
            </div>
            <div class="field-group">
              <label class="label-caps" for="input-rest-working">Working</label>
              <input id="input-rest-working" type="number" class="input-field"
                     placeholder="180" min="10" max="600" inputmode="numeric" />
            </div>
          </div>
          <span class="helper-text">seconds</span>

          <div class="save-row">
            <p class="save-feedback" id="feedback-timers">Saved ✓</p>
            <button id="btn-save-timers" class="btn-save" type="button">
              <span class="btn-label">Save</span>
              <span class="spinner" aria-hidden="true"></span>
            </button>
          </div>

        </div>
      </div>

      <!-- ─── PROGRESSION ────────────────────────────── -->
      <div class="settings-section">
        <span class="label-caps section-label">Progression</span>
        <div class="card settings-card">

          <div class="field-group">
            <label class="label-caps">Weight added each session</label>
            <p class="helper-text" style="margin-top: 3px;">Applied to all exercises after a successful session</p>
            <div class="increment-toggle" role="group" aria-label="Weight increment" style="margin-top: 8px;">
              <button class="toggle-opt" data-increment="2.5" type="button">2.5 lbs</button>
              <button class="toggle-opt active" data-increment="5" type="button">5 lbs</button>
              <button class="toggle-opt" data-increment="10" type="button">10 lbs</button>
            </div>
            <p id="increment-kg-label" class="helper-text" style="margin-top: 6px;">≈ 2.3 kg per session</p>
          </div>

        </div>
      </div>

      <!-- ─── ACCOUNT ──────────────────────────────────── -->
      <div class="settings-section">
        <span class="label-caps section-label">Account</span>
        <div class="card settings-card">

          <div class="field-group">
            <span class="label-caps">Email</span>
            <p id="display-email" class="email-display">—</p>
          </div>

          <button id="btn-logout" class="btn-logout" type="button">
            Log Out
          </button>

        </div>
      </div>

    </main>

    <!-- ── Bottom nav ────────────────────────────────────── -->
    <nav class="bottom-nav">

      <button class="nav-tab" type="button"
              onclick="location.href='workout.html'" aria-label="Workout">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="9"    y="11"  width="6"   height="2"/>
          <rect x="1"    y="8"   width="7.5" height="8" rx="2.5"/>
          <rect x="15.5" y="8"   width="7.5" height="8" rx="2.5"/>
        </svg>
        <span>Workout</span>
      </button>

      <button class="nav-tab" type="button"
              onclick="location.href='tracking.html'" aria-label="Tracking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        <span>Tracking</span>
      </button>

      <button class="nav-tab active" type="button"
              onclick="location.href='settings.html'" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83
                   M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        <span>Settings</span>
      </button>

    </nav>

  </div><!-- .app-container -->

  <script type="module" src="settings.js"></script>
</body>
</html>
